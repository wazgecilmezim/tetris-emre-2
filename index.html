<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TETRİS - Emre Kaftar</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1e 0%, #0a1a2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', 'Tahoma', sans-serif;
            touch-action: manipulation;
        }

        .game-container {
            background: rgba(10, 20, 40, 0.7);
            backdrop-filter: blur(2px);
            border-radius: 56px;
            padding: 20px 20px 25px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            border: 1px solid rgba(80, 180, 255, 0.3);
        }

        .tetris-panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            padding: 10px;
        }

        .game-area {
            text-align: center;
        }

        canvas#boardCanvas {
            background-color: #0a0e1c;
            border-radius: 24px;
            box-shadow: 0 12px 28px black;
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .info-panel {
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            border-radius: 40px;
            padding: 18px 22px;
            min-width: 160px;
            border: 1px solid #2c3e66;
        }

        .score-box {
            background: #000000aa;
            border-radius: 32px;
            padding: 12px 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .score-label {
            color: #8ab3ff;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .score-value {
            color: #f2ea7f;
            font-size: 42px;
            font-weight: 800;
            text-shadow: 0 0 8px #ffb347;
        }

        .next-label {
            color: #a0c4ff;
            text-align: center;
            font-weight: bold;
            margin: 15px 0 8px 0;
        }

        canvas#nextCanvas {
            background-color: #0a0e1c;
            border-radius: 20px;
            margin: 0 auto;
            display: block;
        }

        .control-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 25px;
        }

        .ctrl-btn {
            background: #1e2a3e;
            border: none;
            color: white;
            font-size: 24px;
            font-weight: bold;
            width: 64px;
            height: 64px;
            border-radius: 40px;
            box-shadow: 0 5px 0 #0a101c;
            cursor: pointer;
        }

        .ctrl-btn:active {
            transform: translateY(3px);
        }

        .restart-btn {
            background: #ff6b4a;
            color: white;
            padding: 10px 26px;
            border-radius: 100px;
            font-weight: bold;
            border: none;
            font-size: 18px;
            margin-top: 12px;
            width: 100%;
            cursor: pointer;
        }

        .game-status {
            text-align: center;
            margin-top: 12px;
            font-weight: bold;
            color: #ffd966;
            background: #00000077;
            border-radius: 60px;
            padding: 6px;
        }

        footer {
            text-align: center;
            font-size: 11px;
            color: #6c8db0;
            margin-top: 12px;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="tetris-panel">
        <div class="game-area">
            <canvas id="boardCanvas" width="300" height="600"></canvas>
        </div>

        <div class="info-panel">
            <div class="score-box">
                <div class="score-label">🎯 SKOR</div>
                <div class="score-value" id="scoreDisplay">0</div>
            </div>
            <div class="next-label">🔮 SIRADAKİ</div>
            <canvas id="nextCanvas" width="120" height="120"></canvas>

            <div class="control-buttons">
                <button class="ctrl-btn" id="moveLeft">◀</button>
                <button class="ctrl-btn" id="moveRight">▶</button>
                <button class="ctrl-btn" id="rotateBtn">🔄</button>
                <button class="ctrl-btn" id="hardDropBtn">⬇⬇</button>
            </div>
            <button class="restart-btn" id="restartBtn">🔄 YENİ OYUN</button>
            <div class="game-status" id="gameStatusText">▶ OYNANIYOR</div>
            <footer>🎮 EMRE KAFTAR TETRİS</footer>
        </div>
    </div>
</div>

<script>
    (function(){
        const BOARD_WIDTH = 10;
        const BOARD_HEIGHT = 20;
        let board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
        let score = 0;
        let activePiece = null;
        let gameLoopInterval = null;
        let isGameOver = false;
        
        const boardCanvas = document.getElementById('boardCanvas');
        const boardCtx = boardCanvas.getContext('2d');
        const nextCanvas = document.getElementById('nextCanvas');
        const nextCtx = nextCanvas.getContext('2d');
        const scoreSpan = document.getElementById('scoreDisplay');
        const statusDiv = document.getElementById('gameStatusText');

        const TETROMINOS = [
            { shape: [[1,1,1,1]], color: '#2ad4e3' },
            { shape: [[1,1],[1,1]], color: '#f7e476' },
            { shape: [[0,1,0],[1,1,1]], color: '#ce6ef2' },
            { shape: [[0,1,1],[1,1,0]], color: '#6fcf97' },
            { shape: [[1,1,0],[0,1,1]], color: '#e66767' },
            { shape: [[1,0,0],[1,1,1]], color: '#f0a35e' },
            { shape: [[0,0,1],[1,1,1]], color: '#5dade2' }
        ];

        function getRandomTetromino() {
            const idx = Math.floor(Math.random() * TETROMINOS.length);
            const original = TETROMINOS[idx];
            return {
                shape: original.shape.map(row => [...row]),
                color: original.color,
                x: Math.floor((BOARD_WIDTH - original.shape[0].length)/2),
                y: 0
            };
        }

        let nextTetromino = getRandomTetromino();
        
        function collision(shape, offsetX, offsetY) {
            for(let row = 0; row < shape.length; row++) {
                for(let col = 0; col < shape[0].length; col++) {
                    if(shape[row][col] !== 0) {
                        const boardX = offsetX + col;
                        const boardY = offsetY + row;
                        if(boardX < 0 || boardX >= BOARD_WIDTH || boardY >= BOARD_HEIGHT || boardY < 0) return true;
                        if(boardY >= 0 && board[boardY][boardX] !== 0) return true;
                    }
                }
            }
            return false;
        }

        function mergePiece() {
            if(!activePiece) return;
            for(let r=0; r<activePiece.shape.length; r++) {
                for(let c=0; c<activePiece.shape[0].length; c++) {
                    if(activePiece.shape[r][c] !== 0) {
                        const boardX = activePiece.x + c;
                        const boardY = activePiece.y + r;
                        if(boardY >= 0 && boardY < BOARD_HEIGHT && boardX >=0 && boardX < BOARD_WIDTH) {
                            board[boardY][boardX] = activePiece.color;
                        }
                    }
                }
            }
            clearLines();
            spawnNewPiece();
            drawAll();
        }

        function clearLines() {
            let linesCleared = 0;
            for(let row = BOARD_HEIGHT-1; row >= 0; ) {
                let full = true;
                for(let col = 0; col < BOARD_WIDTH; col++) {
                    if(board[row][col] === 0) { full = false; break; }
                }
                if(full) {
                    for(let r = row; r > 0; r--) board[r] = [...board[r-1]];
                    board[0] = Array(BOARD_WIDTH).fill(0);
                    linesCleared++;
                } else { row--; }
            }
            if(linesCleared > 0) {
                const points = [0, 100, 300, 600, 1000];
                score += points[Math.min(linesCleared,4)];
                scoreSpan.innerText = score;
            }
        }

        function spawnNewPiece() {
            if(!nextTetromino) nextTetromino = getRandomTetromino();
            const newPiece = {
                shape: nextTetromino.shape.map(row => [...row]),
                color: nextTetromino.color,
                x: Math.floor((BOARD_WIDTH - nextTetromino.shape[0].length)/2),
                y: 0
            };
            nextTetromino = getRandomTetromino();
            
            if(collision(newPiece.shape, newPiece.x, newPiece.y)) {
                isGameOver = true;
                if(gameLoopInterval) clearInterval(gameLoopInterval);
                gameLoopInterval = null;
                statusDiv.innerText = '💀 OYUN BİTTİ 💀';
                return false;
            }
            activePiece = newPiece;
            return true;
        }

        function movePiece(dx, dy) {
            if(!activePiece || isGameOver) return false;
            const newX = activePiece.x + dx;
            const newY = activePiece.y + dy;
            if(!collision(activePiece.shape, newX, newY)) {
                activePiece.x = newX;
                activePiece.y = newY;
                drawAll();
                return true;
            } else if(dy === 1) {
                mergePiece();
                drawAll();
            }
            return false;
        }

        function rotatePiece() {
            if(!activePiece || isGameOver) return;
            const rotated = activePiece.shape[0].map((_, idx) => activePiece.shape.map(row => row[idx]).reverse());
            if(!collision(rotated, activePiece.x, activePiece.y)) {
                activePiece.shape = rotated;
                drawAll();
            }
        }

        function hardDrop() {
            if(!activePiece || isGameOver) return;
            while(!collision(activePiece.shape, activePiece.x, activePiece.y+1)) activePiece.y++;
            mergePiece();
            drawAll();
        }

        const blockSize = 30;
        function drawBoard() {
            boardCtx.clearRect(0,0,300,600);
            for(let row=0; row<BOARD_HEIGHT; row++) {
                for(let col=0; col<BOARD_WIDTH; col++) {
                    const color = board[row][col];
                    const x = col * blockSize;
                    const y = row * blockSize;
                    if(color !== 0) {
                        boardCtx.fillStyle = color;
                        boardCtx.fillRect(x, y, blockSize-0.5, blockSize-0.5);
                        boardCtx.fillStyle = "rgba(255,255,255,0.2)";
                        boardCtx.fillRect(x+2, y+2, blockSize-5, 4);
                    } else {
                        boardCtx.fillStyle = "#11141f";
                        boardCtx.fillRect(x, y, blockSize-0.5, blockSize-0.5);
                        boardCtx.strokeStyle = "#253449";
                        boardCtx.strokeRect(x+0.5, y+0.5, blockSize-1, blockSize-1);
                    }
                }
            }
            if(activePiece && !isGameOver) {
                for(let r=0; r<activePiece.shape.length; r++) {
                    for(let c=0; c<activePiece.shape[0].length; c++) {
                        if(activePiece.shape[r][c]) {
                            const x = (activePiece.x + c) * blockSize;
                            const y = (activePiece.y + r) * blockSize;
                            boardCtx.fillStyle = activePiece.color;
                            boardCtx.fillRect(x, y, blockSize-0.5, blockSize-0.5);
                            boardCtx.fillStyle = "rgba(255,245,180,0.35)";
                            boardCtx.fillRect(x+2, y+2, blockSize-5, 5);
                        }
                    }
                }
            }
            if(isGameOver){
                boardCtx.globalAlpha = 0.7;
                boardCtx.fillStyle = "#000000";
                boardCtx.fillRect(0,0,300,600);
                boardCtx.globalAlpha = 1;
                boardCtx.fillStyle = "#ffbb77";
                boardCtx.font = "bold 20px 'Segoe UI'";
                boardCtx.fillText("GAME OVER", 70, 280);
            }
        }

        function drawNext() {
            nextCtx.clearRect(0,0,120,120);
            nextCtx.fillStyle = "#0b1020";
            nextCtx.fillRect(0,0,120,120);
            if(nextTetromino) {
                const shape = nextTetromino.shape;
                const color = nextTetromino.color;
                const blockN = 25;
                const startX = (120 - (shape[0].length * blockN)) / 2;
                const startY = (120 - (shape.length * blockN)) / 2;
                for(let r=0; r<shape.length; r++) {
                    for(let c=0; c<shape[0].length; c++) {
                        if(shape[r][c]) {
                            nextCtx.fillStyle = color;
                            nextCtx.fillRect(startX + c*blockN, startY + r*blockN, blockN-1, blockN-1);
                        }
                    }
                }
            }
        }

        function drawAll() {
            drawBoard();
            drawNext();
        }

        function gameTick() {
            if(!isGameOver && activePiece) movePiece(0, 1);
        }

        function startGameLoop() {
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(() => gameTick(), 340);
        }

        function restartGame() {
            if(gameLoopInterval) clearInterval(gameLoopInterval);
            board = Array(BOARD_HEIGHT).fill().map(() => Array(BOARD_WIDTH).fill(0));
            score = 0;
            isGameOver = false;
            scoreSpan.innerText = "0";
            nextTetromino = getRandomTetromino();
            activePiece = null;
            spawnNewPiece();
            statusDiv.innerText = '▶ OYNANIYOR';
            startGameLoop();
            drawAll();
        }

        function attachControls() {
            document.getElementById('moveLeft').addEventListener('click',()=>movePiece(-1,0));
            document.getElementById('moveRight').addEventListener('click',()=>movePiece(1,0));
            document.getElementById('rotateBtn').addEventListener('click',()=>rotatePiece());
            document.getElementById('hardDropBtn').addEventListener('click',()=>hardDrop());
            document.getElementById('restartBtn').addEventListener('click',()=>restartGame());
            window.addEventListener('keydown', (e)=>{
                if(e.key === 'ArrowLeft') movePiece(-1,0);
                else if(e.key === 'ArrowRight') movePiece(1,0);
                else if(e.key === 'ArrowDown') movePiece(0,1);
                else if(e.key === 'ArrowUp') rotatePiece();
                else if(e.key === ' ') { hardDrop(); e.preventDefault();}
                else if(e.key === 'r') restartGame();
            });
        }

        function init() {
            attachControls();
            restartGame();
        }
        init();
    })();
</script>
</body>
</html>
