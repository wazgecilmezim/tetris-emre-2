name: Build AAB

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build AAB
        run: gradle :app:bundleRelease --no-daemon --stacktrace 2>&1 | head -150

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-AAB-Paketi
          path: app/build/outputs/bundle/release/*.aab
