name: Build AAB
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build with Gradle
        run: |
          gradle bundleRelease
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: Tetris-Paketi
          path: "**/*.aab"
