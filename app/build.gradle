plugins {
    id 'com.android.application'
}

android {
    namespace 'com.emre.tetris'
    compileSdk 34

    defaultConfig {
        applicationId "com.emre.tetris"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug  // imza yoksa debug key kullan
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
}

android {
    ...
    buildTypes {
        release {
            minifyEnabled false
            signingConfig null
        }
    }
}
