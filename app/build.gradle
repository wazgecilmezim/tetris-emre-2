plugins {
    id 'com.android.application'
}

android {
    // Paket ismini senin istediğin gibi 'destiniy' olarak güncelledik.
    namespace 'com.emre.destiniy'
    compileSdk 35

    defaultConfig {
        // Uygulamanın Google Play'deki benzersiz kimliği. 
        // Telif sorununu aşmak için 'com.emre.destiniy' yapıldı.
        applicationId "com.emre.destiniy" 
        minSdk 21
        targetSdk 35
        
        // Önceki denemelerle çakışmaması için sürümü 4 yaptık.
        versionCode 4
        versionName "1.0.3"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    signingConfigs {
        release {
            storeFile file("keystore.jks")
            storePassword System.getenv("STORE_PASSWORD")
            keyAlias System.getenv("KEY_ALIAS")
            keyPassword System.getenv("KEY_PASSWORD")
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
}
